<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Fullscreen Video</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body{
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: sans-serif;
      touch-action: manipulation;
    }

    body{
      position: fixed;
      inset: 0;
    }

    /* Tombol play */
    #playButton{
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      cursor: pointer;
    }

    #playButton img{
      width: 180px;
      height: auto;
      display: block;
    }

    /* Overlay */
    #overlay{
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: white;
      z-index: 10;
      display: none;
    }

    /* Loading GIF */
    #loading{
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      display: none;
    }

    #loading img{
      width: 120px;
      height: auto;
    }

    /* Video container */
    #videoContainer{
      position: fixed;
      inset: 0;

      width: 100vw;
      height: 100vh;

      background: white;
      display: none;

      justify-content: center;
      align-items: center;
      overflow: hidden;

      z-index: 5;
    }

    video{
      width: 100vw;
      height: auto;

      max-width: 100vw;
      max-height: 100vh;

      object-fit: contain;

      background: white;
    }

    .hide{
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- Tombol -->
  <div id="playButton">
    <img src="button.gif" alt="Play Button">
  </div>

  <!-- Overlay -->
  <div id="overlay"></div>

  <!-- Loading -->
  <div id="loading">
    <img src="loading.gif" alt="Loading">
  </div>

  <!-- Video -->
  <div id="videoContainer">
    <video 
      id="myVideo"
      playsinline
      webkit-playsinline
      preload="auto"
      controlslist="nodownload noplaybackrate"
      disablepictureinpicture
    >
      <source src="video.mp4" type="video/mp4">
      Browser tidak mendukung video.
    </video>
  </div>

  <script>
    const video = document.getElementById("myVideo");
    const overlay = document.getElementById("overlay");
    const container = document.getElementById("videoContainer");
    const playButton = document.getElementById("playButton");
    const loading = document.getElementById("loading");

    async function enterFullscreen() {
      try {

        // Android / modern browser
        if (document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen();
        }

        // Safari iPhone
        else if (video.webkitEnterFullscreen) {
          video.webkitEnterFullscreen();
        }

      } catch (err) {
        console.log("Fullscreen gagal:", err);
      }
    }

    // Klik tombol
    playButton.addEventListener("click", async () => {

      // sembunyikan tombol
      playButton.classList.add("hide");

      // tampilkan overlay
      overlay.style.display = "block";

      // tampilkan loading
      loading.style.display = "block";

      // load video
      video.load();

      // saat video siap
      video.addEventListener("canplaythrough", async function startVideo(){

        // tampilkan container video
        container.style.display = "flex";

        // fullscreen mobile
        await enterFullscreen();

        // putar video
        try {
          await video.play();
        } catch (e) {
          console.log("Video gagal diputar:", e);
        }

        // sembunyikan loading
        loading.classList.add("hide");

        // hilangkan overlay
        setTimeout(() => {
          overlay.classList.add("hide");
        }, 300);

        // hapus listener
        video.removeEventListener("canplaythrough", startVideo);

      }, { once: true });

    });

    // selesai video
    video.addEventListener("ended", () => {

      container.classList.add("hide");

      document.body.style.background = "white";

      // keluar fullscreen
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }

    });
  </script>

</body>
</html>
